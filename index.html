<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BricoMax — Tu Tienda de Bricolaje</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <!-- Estilos -->
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar navbar-expand-lg sticky-top" id="mainNav">
    <div class="container-fluid px-4">

      <a class="navbar-brand fw-bold fs-4" href="#">
        <i class="bi bi-tools me-2"></i>BricoMax
      </a>

      <button class="navbar-toggler" type="button"
        data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto gap-1">
          <li class="nav-item">
            <a class="nav-link category-link" href="#" data-category="herramientas">
              <i class="bi bi-wrench-adjustable me-1"></i>Herramientas
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link category-link" href="#" data-category="electricidad">
              <i class="bi bi-lightning-charge me-1"></i>Electricidad
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link category-link" href="#" data-category="fontaneria">
              <i class="bi bi-droplet me-1"></i>Fontanería
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link category-link" href="#" data-category="pintura">
              <i class="bi bi-brush me-1"></i>Pintura
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link category-link" href="#" data-category="madera">
              <i class="bi bi-tree me-1"></i>Madera
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link category-link" href="#" data-category="jardineria">
              <i class="bi bi-flower1 me-1"></i>Jardinería
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link category-link" href="#" data-category="seguridad">
              <i class="bi bi-shield-check me-1"></i>Seguridad
            </a>
          </li>
        </ul>

        <!-- Botón carrito -->
        <button class="btn btn-cart position-relative ms-3" id="cartBtn">
          <i class="bi bi-cart3 fs-5"></i>
          <span class="badge cart-badge" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </nav>
  <!-- ===== FIN NAVBAR ===== -->


  <!-- ===== PRODUCTOS ===== -->
  <main class="container-fluid px-4 py-4" id="productsSection">
    <h5 class="section-title mb-4" id="categoryTitle">Todos los productos</h5>
    <div class="row g-4" id="productsGrid">
      <!-- Renderizado por app.js -->
    </div>
  </main>


  <!-- ===== MODAL CARRITO ===== -->
  <div class="modal fade" id="cartModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title fw-bold">
            <i class="bi bi-cart3 me-2"></i>Carrito de compras
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body" id="cartModalBody">
          <!-- Renderizado por cartModal.js -->
        </div>

        <div class="modal-footer d-flex justify-content-between align-items-center">
          <div>
            <span class="text-muted me-2">Total:</span>
            <span class="fs-5 fw-bold" id="cartTotal">$0</span>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-danger btn-sm" onclick="clearCart()">
              <i class="bi bi-trash me-1"></i>Vaciar
            </button>
            <button class="btn btn-success btn-sm">
              <i class="bi bi-credit-card me-1"></i>Finalizar compra
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>
  <!-- ===== FIN MODAL CARRITO ===== -->


  <!-- ===== MODAL DETALLE PRODUCTO ===== -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">

        <!-- Header -->
        <div class="modal-header">
          <h5 class="modal-title" id="detailModalLabel">Producto</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>

        <!-- Body -->
        <div class="modal-body">
          <div class="row">
            <div class="col-md-5">
              <img id="detailModalImg" class="img-fluid rounded" />
            </div>
            <div class="col-md-7">
              <p id="detailModalDesc"></p>
              <h4 class="fw-bold text-orange" id="detailModalPrice"></h4>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
  <!-- ===== FIN MODAL DETALLE ===== -->


  <!-- ===== SCRIPTS ===== -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/cart.js"></script>
  <script src="js/cartModal.js"></script>
  <script src="js/app.js"></script>
  <script src="js/Detailmodal.js"></script>

</body>
</html>
