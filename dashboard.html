<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | BricoMax</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="css/dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
<a class="navbar-brand fw-bold" href="index.html">
<i class="bi bi-tools me-2"></i>BricoMax Admin
</a>

<a href="index.html" class="btn btn-warning">
<i class="bi bi-shop me-1"></i>Tienda
</a>
</nav>

<div class="container-fluid py-4">

<h2 class="fw-bold mb-4">Panel de Estadísticas</h2>

<div class="row g-4 mb-4">

<div class="col-md-3">
<div class="card stat-card">
<h6>Ventas Hoy</h6>
<h3>$2.450.000</h3>
</div>
</div>

<div class="col-md-3">
<div class="card stat-card">
<h6>Pedidos</h6>
<h3>38</h3>
</div>
</div>

<div class="col-md-3">
<div class="card stat-card">
<h6>Clientes</h6>
<h3>124</h3>
</div>
</div>

<div class="col-md-3">
<div class="card stat-card">
<h6>Productos</h6>
<h3>86</h3>
</div>
</div>

</div>

<div class="row g-4">

<div class="col-lg-8">
<div class="card p-4">
<h5 class="mb-3">Ventas Semanales</h5>
<canvas id="ventasChart"></canvas>
</div>
</div>

<div class="col-lg-4">
<div class="card p-4">
<h5 class="mb-3">Categorías</h5>
<canvas id="categoriasChart" height="320"></canvas>
</div>
</div>

</div>

<div class="card mt-4 p-4">
<h5 class="mb-3">Productos Destacados</h5>

<table class="table">
<thead>
<tr>
<th>Producto</th>
<th>Ventas</th>
<th>Stock</th>
<th>Estado</th>
</tr>
</thead>

<tbody>
<tr><td>Taladro Bosch</td><td>24</td><td>18</td><td><span class="badge bg-success">OK</span></td></tr>
<tr><td>Martillo Stanley</td><td>17</td><td>9</td><td><span class="badge bg-warning text-dark">Bajo</span></td></tr>
<tr><td>Sierra Circular</td><td>12</td><td>6</td><td><span class="badge bg-danger">Crítico</span></td></tr>
<tr><td>Juego de Llaves</td><td>30</td><td>26</td><td><span class="badge bg-success">OK</span></td></tr>
</tbody>

</table>
</div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
